name: Publish New Art

on:
  push:
    branches: [main]
    paths:
      - 'blog/art/**/*.md'
  workflow_dispatch:
    inputs:
      force_republish:
        description: 'Force re-publish even if flags unchanged (for testing)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          mkdir -p .github/temp
          cd .github/temp
          echo '{"name":"temp","version":"1.0.0"}' > package.json
          npm install --ignore-scripts gray-matter axios @atproto/api
          cd ../..
          # Symlink node_modules so the script can find the packages
          ln -sf .github/temp/node_modules node_modules
      
      - name: Process and publish new art
        env:
          BLUESKY_USERNAME: ${{ secrets.BLUESKY_USERNAME }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SITE_URL: 'https://wescarr.com'  # Your actual site URL
          INPUT_FORCE_REPUBLISH: ${{ inputs.force_republish }}
        run: node .github/scripts/publish-art.js

